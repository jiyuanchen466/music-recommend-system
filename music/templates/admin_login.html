<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炫音娱乐--管理员登陆</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/commen.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}">
    <link rel="icon" href="{% static 'imgs/logo.ico' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'fonts/iconfont18/iconfont.css' %}">
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <h2 class="admin-title">管理员登陆</h2>
            <form method="post" class="admin-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="admin-username"><i class="iconfont icon-zhanghao"></i></label>
                    <input type="text" name="username" id="admin-username" placeholder="请输入账号" maxlength="30" required>
                </div>
                <div class="form-group">
                    <label for="admin-password"><i class="iconfont icon-mima"></i></label>
                    <input type="password" name="password" id="admin-password" placeholder="请输入密码" maxlength="25" required>
                    <i class="iconfont icon-biyanjing" id="toggle-password"></i>
                </div>
                <button type="submit" class="admin-login-btn">登陆</button>
            </form>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
        </div>
    </div>
    <script src="{% static 'js/admin_login.js' %}"></script>
</body>
</html>
